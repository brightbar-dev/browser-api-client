<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="manifest.open_in_tab" />
  <title>Browser API Client — Settings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bac-options">
    <h1>Browser API Client Settings</h1>

    <section class="bac-section">
      <h2>Appearance</h2>
      <div class="bac-field">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="auto">Auto (system)</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </section>

    <section class="bac-section">
      <h2>History</h2>
      <div class="bac-field">
        <label for="max-history">Max history entries</label>
        <input type="number" id="max-history" min="10" max="1000" value="100" />
      </div>
      <button id="clear-history" class="bac-danger-btn">Clear All History</button>
    </section>

    <section class="bac-section">
      <h2>Data</h2>
      <button id="export-data" class="bac-btn">Export All Data</button>
      <button id="import-data" class="bac-btn">Import Data</button>
      <input type="file" id="import-file" accept=".json" style="display:none" />
    </section>

    <section class="bac-section">
      <h2>About</h2>
      <p>Browser API Client v0.1.0</p>
      <p>Built by <a href="https://brightbar.dev" target="_blank">Brightbar</a></p>
    </section>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
